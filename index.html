<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoReto: Ley 7/2022</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef5f3;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #2e7d32; margin-bottom: 5px; }
        p { color: #555; }
        .score-board {
            font-size: 1.2rem;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        .waste-zone {
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            background: #ffffff;
            border: 2px dashed #a5d6a7;
            border-radius: 15px;
            padding: 10px;
        }
        .waste-item {
            padding: 12px 20px;
            background-color: #ffe082;
            border: 2px solid #ffb300;
            border-radius: 25px;
            cursor: grab;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
        }
        .waste-item:active { cursor: grabbing; }
        .bins-zone {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            width: 100%;
        }
        .bin {
            width: 130px;
            height: 180px;
            border-radius: 10px 10px 5px 5px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-weight: bold;
            padding: 15px 5px;
            box-sizing: border-box;
            font-size: 0.9rem;
            box-shadow: 0 6px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .bin:hover { transform: scale(1.05); }
        /* Colores de contenedores según normativa estándar */
        .bin.azul { background-color: #0d47a1; border: 3px solid #0a3578; }
        .bin.amarillo { background-color: #ffeb3b; border: 3px solid #fbc02d; color: #333; }
        .bin.verde { background-color: #1b5e20; border: 3px solid #113b14; }
        .bin.marron { background-color: #5d4037; border: 3px solid #4e342e; }
        .bin.gris { background-color: #616161; border: 3px solid #424242; }
        .bin.puntosigre { background-color: #00bcd4; border: 3px solid #0097a7; }

        .bin-slot {
            width: 90%;
            height: 40px;
            border: 2px dashed rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
        .bin.amarillo .bin-slot { border-color: rgba(0,0,0,0.3); background: rgba(0,0,0,0.05); }

        #message {
            font-size: 1.3rem;
            font-weight: bold;
            height: 30px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>EcoReto: Ley 7/2022</h1>
    <p>Arrastra el residuo al contenedor correcto para cumplir con los objetivos de reciclaje.</p>

    <div class="score-board">
        Puntuación: <span id="score">0</span> | Tiempo restante: <span id="timer">45</span>s
    </div>

    <div class="game-container">
        <div class="waste-zone" id="waste-zone">
            </div>

        <div class="bins-zone">
            <div class="bin azul" data-type="azul" ondragover="allowDrop(event)" ondrop="drop(event)">
                <span>PAPEL Y CARTÓN</span>
                <div class="bin-slot"></div>
            </div>
            <div class="bin amarillo" data-type="amarillo" ondragover="allowDrop(event)" ondrop="drop(event)">
                <span>ENVASED LIGEROS</span>
                <div class="bin-slot"></div>
            </div>
            <div class="bin verde" data-type="verde" ondragover="allowDrop(event)" ondrop="drop(event)">
                <span>VIDRIO</span>
                <div class="bin-slot"></div>
            </div>
            <div class="bin marron" data-type="marron" ondragover="allowDrop(event)" ondrop="drop(event)">
                <span>ORGÁNICO (Biorresiduo)</span>
                <div class="bin-slot"></div>
            </div>
            <div class="bin gris" data-type="gris" ondragover="allowDrop(event)" ondrop="drop(event)">
                <span>RESTO / RECHAZO</span>
                <div class="bin-slot"></div>
            </div>
            <div class="bin puntosigre" data-type="sigre" ondragover="allowDrop(event)" ondrop="drop(event)">
                <span>PUNTO SIGRE (Medicamentos)</span>
                <div class="bin-slot"></div>
            </div>
        </div>
    </div>

    <div id="message"></div>

    <script>
        // Lista amplia de residuos basada en la clasificación de la Ley 7/2022
        const wasteList = [
            { name: "Caja de cartón", type: "azul" },
            { name: "Periódico viejo", type: "azul" },
            { name: "Folios usados", type: "azul" },
            { name: "Botella de plástico", type: "amarillo" },
            { name: "Lata de refresco", type: "amarillo" },
            { name: "Brik de leche", type: "amarillo" },
            { name: "Bolsa de patatas fritas", type: "amarillo" },
            { name: "Botella de vidrio", type: "verde" },
            { name: "Tarro de mermelada (sin tapa)", type: "verde" },
            { name: "Restos de fruta", type: "marron" },
            { name: "Peladuras de verdura", type: "marron" },
            { name: "Posos de café", type: "marron" },
            { name: "Servilleta de papel sucia", type: "marron" }, // La Ley potencia la recogida separada de biorresiduos
            { name: "Pañal usado", type: "gris" },
            { name: "Colilla de cigarrillo", type: "gris" },
            { name: "Polvo de barrer", type: "gris" },
            { name: "Plato de cerámica roto", type: "gris" },
            { name: "Caja de medicamento vacía", type: "sigre" },
            { name: "Blíster con pastillas caducadas", type: "sigre" },
            { name: "Jarabe a medias", type: "sigre" }
        ];

        let score = 0;
        let timeLeft = 45;
        let currentWaste = null;
        let timerInterval;

        const scoreEl = document.getElementById("score");
        const timerEl = document.getElementById("timer");
        const wasteZone = document.getElementById("waste-zone");
        const messageEl = document.getElementById("message");

        function startGame() {
            score = 0;
            timeLeft = 45;
            scoreEl.innerText = score;
            timerEl.innerText = timeLeft;
            messageEl.innerText = "";
            nextWaste();
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                timerEl.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    endGame();
                }
            }, 1000);
        }

        function nextWaste() {
            wasteZone.innerHTML = "";
            if (timeLeft <= 0) return;

            // Elegir un residuo aleatorio
            const randomIndex = Math.floor(Math.random() * wasteList.length);
            currentWaste = wasteList[randomIndex];

            // Crear el elemento arrastrable
            const wasteItem = document.createElement("div");
            wasteItem.className = "waste-item";
            wasteItem.innerText = currentWaste.name;
            wasteItem.draggable = true;
            wasteItem.id = "active-waste";
            
            // Eventos de arrastrar
            wasteItem.addEventListener("dragstart", dragStart);

            wasteZone.appendChild(wasteItem);
        }

        function dragStart(e) {
            e.dataTransfer.setData("text/plain", currentWaste.type);
        }

        function allowDrop(e) {
            e.preventDefault();
        }

        function drop(e) {
            e.preventDefault();
            if (timeLeft <= 0) return;

            // Conseguir el contenedor sobre el que se soltó
            const bin = e.currentTarget;
            const binType = bin.getAttribute("data-type");
            const correctType = e.dataTransfer.getData("text/plain");

            if (binType === correctType) {
                score += 10;
                scoreEl.innerText = score;
                messageEl.style.color = "#2e7d32";
                messageEl.innerText = "¡Correcto! ¡Buen reciclaje! 🌱";
            } else {
                score = Math.max(0, score - 5); // Penaliza pero no baja de 0
                scoreEl.innerText = score;
                messageEl.style.color = "#d32f2f";
                // Explicación rápida según la Ley 7/2022
                let hint = "¡Incorrecto!";
                if (correctType === "marron") hint = "¡No! Los restos orgánicos van al contenedor marrón.";
                if (correctType === "sigre") hint = "¡No! Los medicamentos y sus envases van al Punto SIGRE de la farmacia.";
                if (correctType === "gris") hint = "¡No! Eso va a Fracción Resto (gris), no se puede reciclar fácilmente.";
                messageEl.innerText = hint;
            }

            // Cargar el siguiente residuo inmediatamente
            nextWaste();
        }

        function endGame() {
            wasteZone.innerHTML = "<h3>¡Tiempo agotado!</h3>";
            messageEl.style.color = "#0288d1";
            messageEl.innerHTML = `Juego terminado. Conseguiste <strong>${score} puntos</strong>. <br><button onclick="startGame()" style="margin-top:10px; padding:8px 15px; font-size:1rem; cursor:pointer;">Jugar de nuevo</button>`;
        }

        // Iniciar el juego automáticamente al cargar la página
        window.onload = startGame;
    </script>
</body>
</html>
